services:
  - type: web
    name: webdasturlashedu-api
    runtime: python
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application --log-file - --workers 3 --timeout 120
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: webdasturlashedu-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: api.cloude.uz
      - key: CORS_ALLOWED_ORIGINS
        value: https://cloude.uz
      - key: CSRF_TRUSTED_ORIGINS
        value: https://cloude.uz,https://api.cloude.uz
      - key: SECURE_SSL_REDIRECT
        value: true
      - key: WEB_CONCURRENCY
        value: 3

databases:
  - name: webdasturlashedu-db
    databaseName: webdasturlashedu
    user: webdasturlashedu
